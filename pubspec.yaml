name: todo_schedule
description: A beautiful Todo app with scheduling by days and weeks.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.1.1
  shared_preferences: ^2.2.2
  intl: ^0.19.0
  uuid: ^4.2.1
  flutter_slidable: ^3.0.1
  table_calendar: ^3.0.9
  flutter_staggered_animations: ^1.1.1
  animate_do: ^3.3.3
  google_fonts: ^6.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
